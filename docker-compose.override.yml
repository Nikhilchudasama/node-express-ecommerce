services:
  migrate:
    volumes:
      - ./prisma:/app/prisma

  app:
    build:
      target: builder
    command: >
      sh -c "
        npx prisma generate &&
        npx ts-node-dev --respawn --transpile-only src/index.ts
      "
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./tsconfig.json:/app/tsconfig.json
      - ./prisma.config.ts:/app/prisma.config.ts
      - /app/node_modules
    environment:
      NODE_ENV: development
    healthcheck:
      disable: true
