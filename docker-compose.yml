name: node-ecom

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: node-ecom
    # Uncomment to expose on host (change port if running local PG):
    # ports:
    #   - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  migrate:
    build:
      context: .
    restart: "no"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/node-ecom?schema=public
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy"
    networks:
      - app-network

  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/node-ecom?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-docker-jwt-secret}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
